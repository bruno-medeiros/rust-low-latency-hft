# Continuous benchmark tracking via https://github.com/benchmark-action/github-action-benchmark
#
# Custom `harness = false` benches (bench-tool JSON): `github-action-json` → custom JSON tools.
#
# First-time setup: create an empty `gh-pages` branch (or let the action create data on first push
# if your repo allows token pushes to that branch).

name: Benchmark

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Bench binaries run with CWD = the crate package dir (e.g. limit-order-book/), not the repo
    # root. Use workspace-absolute paths for --save-json so outputs land next to later steps.
    env:
      BENCH_CI: ${{ github.workspace }}/benchmark-ci
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Linux benchmark tuning (best-effort)
        run: |
          set -euo pipefail
          sudo bash "${{ github.workspace }}/run-benchmarks-linux-setup.sh"

      - name: Run benchmarks
        run: |
          set -euo pipefail
          mkdir -p "$BENCH_CI"
          cargo bench -p limit-order-book --bench lob -- \
            --lob-version v0 \
            --save-json "$BENCH_CI/lob_v0.json"
          cargo bench -p limit-order-book --bench lob -- \
            --lob-version v1 \
            --save-json "$BENCH_CI/lob_v1.json"
          cargo bench -p matching-pipeline --bench pipeline -- \
            --save-json "$BENCH_CI/pipeline.json"

      - name: Convert bench-tool JSON for github-action-benchmark
        run: |
          set -euo pipefail
          cargo run -p bench-tool --locked --bin github-action-json -- \
            --report "LOB v0" "$BENCH_CI/lob_v0.json" \
            --report "LOB v1" "$BENCH_CI/lob_v1.json" \
            --report "Pipeline" "$BENCH_CI/pipeline.json" \
            --out-latency "$BENCH_CI/github-latency.json" \
            --out-throughput "$BENCH_CI/github-throughput.json"

      - name: Store benchmark result (throughput)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust benchmarks (throughput)
          tool: customBiggerIsBetter
          output-file-path: benchmark-ci/github-throughput.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          benchmark-data-dir-path: dev/bench
          summary-always: true

      - name: Store benchmark result (latency)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust benchmarks (latency)
          tool: customSmallerIsBetter
          output-file-path: benchmark-ci/github-latency.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
          benchmark-data-dir-path: dev/bench
          summary-always: true
